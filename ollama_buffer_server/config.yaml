name: Ollama Buffer Server
version: "0.1.2"
slug: ollama_buffer_server
init: false
description: "Buffer server for AI-generated replies"
arch:
  - amd64
  - aarch64
startup: "services"
boot: "auto"
map:
  - config:rw
ports:
  8000/tcp: 8000
options:
  endpoint_address: "http://127.0.0.1:11434/api/generate"
  auth_token: "YOUR_SECRET_TOKEN"
  max_concurrent_requests: 2
  timeout: 10
  database_file: "/data/buffer.db"
  endpoints: []
  log_level: "info"
  fallback_replies: []
schema:
  endpoints:
    - name: str
      max_buffer_size: int
      model: str
      prompt_for_buffer: str?
      temperature: float?
      maintain_max_buffer: bool?
      fallback_replies: list(str)?
  endpoint_address: str
  auth_token: str
  max_concurrent_requests: int
  timeout: int
  database_file: str
  log_level: "list(trace|debug|info|warning|error|fatal|off)"
